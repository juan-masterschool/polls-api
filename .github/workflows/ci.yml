name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t polls-api:latest .

        # Run the container
      - name: Run Container
        run: |
          docker run -d -p 5001:5001 --name polls-api-test polls-api:latest
          sleep 5
          curl http://localhost:5001/api/health || exit 1
        
        



