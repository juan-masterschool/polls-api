name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t polls-api:latest .

        # Run the container
      - name: Run Container
        run: |
          docker run -d -p 5001:5001 --name polls-api-test polls-api:latest
          sleep 5
          curl http://localhost:5001/api/health || exit 1

      - name: Set Up Python
        uses: actions/setup-python@v5

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest -v

      - name: Stop And Remove Containers
        run: |
          docker stop polls-api-test
          docker rm polls-api-test

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        



