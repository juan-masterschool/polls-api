name: CI

on:
  push:
    branches: [main]
  pull_request: 
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Clone/Checkout Code
      uses: actions/checkout@v7

    - name: Set Up Docker
      uses: docker/setup-buildx-action@v4

    - name: Build Docker Image
      run: docker build -t polls-api .

    - name: Run Container
      run: docker run -d -p 5001:5001 --name polls-api-container polls-api

    
